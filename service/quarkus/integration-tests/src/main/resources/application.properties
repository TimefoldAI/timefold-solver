########################
# Timefold application info
########################
timefold.application.name=Timefold SDK - Integration Tests
timefold.application.version=v1

########################
# OpenAPI ans swagger ui configuration
########################
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.title=${timefold.application.name}
quarkus.smallrye-openapi.store-schema-directory=target/openapi-schema
mp.openapi.extensions.smallrye.info.title=${timefold.application.name}
mp.openapi.extensions.smallrye.info.version=${timefold.application.version}

ai.timefold.storage.path=target
ai.timefold.storage.ttl=P1D

ai.timefold.model.default-config.resources.memory.mi=256
ai.timefold.model.default-config.resources.cpu.cores=1
ai.timefold.model.default-config.termination.spent-limit=PT30M
ai.timefold.model.default-config.termination.unimproved-spent-limit=PT5M
ai.timefold.platform.termination.spent-limit=PT30S

# Useful for verifying bytecode generated using Gizmo
#quarkus.package.jar.decompiler.enabled=true