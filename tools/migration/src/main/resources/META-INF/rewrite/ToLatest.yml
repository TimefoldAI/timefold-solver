type: specs.openrewrite.org/v1beta/recipe
name: ai.timefold.solver.migration.ToLatest
displayName: Upgrade to the latest Timefold Solver
description: 'Replace all your calls to deleted/deprecated types and methods of Timefold Solver with their proper alternatives.'
recipeList:
  # Solver 1.x
  - ai.timefold.solver.migration.ToV1
  # Solver 2.x
  - ai.timefold.solver.migration.ChangeVersion
  - org.openrewrite.java.DeleteMethodArgument:
      methodPattern: ai.timefold.solver.core.api.score.constraint.ConstraintRef of(String, String)
      argumentIndex: 0
  - org.openrewrite.java.DeleteMethodArgument:
      methodPattern: ai.timefold.solver.core.api.score.stream.ConstraintBuilder asConstraint(String, String)
      argumentIndex: 0
  - org.openrewrite.java.RemoveAnnotationAttribute:
      annotationType: "ai.timefold.solver.core.api.domain.solution.PlanningSolution"
      attributeName: "lookUpStrategyType"
  - org.openrewrite.java.RemoveAnnotationAttribute:
      annotationType: "ai.timefold.solver.core.api.domain.solution.PlanningSolution"
      attributeName: "autoDiscoverMemberType"
  - ai.timefold.solver.migration.v2.GeneralMethodDeleteInvocationMigrationRecipe
  - ai.timefold.solver.migration.v2.GeneralMethodChangeNameMigrationRecipe
  - ai.timefold.solver.migration.v2.GeneralTypeChangeMigrationRecipe
  - ai.timefold.solver.migration.v2.ProblemIdDeletionMigrationRecipe
  - ai.timefold.solver.migration.v2.TestingAPIsMigrationRecipe
  - ai.timefold.solver.migration.v2.GeneralDependencyDeleteMigrationRecipe
  - ai.timefold.solver.migration.v2.GeneralPackageRenameMigrationRecipe
  - org.openrewrite.java.RemoveUnusedImports
