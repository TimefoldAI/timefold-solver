# The model application uses ordinals for:
# - classpath application.properties (250)
# - META-INF/microprofile-config.properties (100).
#
# The SDK uses lower ordinals to give the application config the priority:
# - model-defaults application.properties (230)
# - classpath application.properties (210)
# - META-INF/microprofile-config.properties (80).
#
# Note: Cannot be implemented as ConfigSource due to issue with native: https://github.com/quarkusio/quarkus/issues/28269
config_ordinal=230

#######################################
# To be overridden by the actual model
#######################################
timefold.application.id=custom-timefold-model
timefold.application.name=Custom Timefold model
timefold.application.description=
timefold.application.version=${model.api.version}
timefold.application.build-timestamp=
timefold.application.contact.email=
timefold.application.contact.name=
timefold.application.contact.url=

#############################
# Default generic storage configuration
#############################

ai.timefold.storage.bucket=${timefold.application.id}

###########################################
# Default solver termination configuration
###########################################

ai.timefold.platform.termination.spent-limit=PT10M
# disabling the unimproved-spent-limit enables Diminished Returns termination
ai.timefold.platform.termination.unimproved-spent-limit=

# Override the Diminished Returns termination defaults (solver-core defaults to PT30S / 0.0001).
# Leave unset to keep the built-in defaults.
#ai.timefold.platform.termination.diminished-returns.sliding-window-duration=
#ai.timefold.platform.termination.diminished-returns.minimum-improvement-ratio=

%dev.ai.timefold.platform.termination.spent-limit=PT30S
%dev.ai.timefold.platform.termination.unimproved-spent-limit=

#############################
# Default test configuration
#############################
%test.quarkus.timefold.solver.environment-mode=FULL_ASSERT

%test.ai.timefold.platform.termination.spent-limit=PT10S
%test.ai.timefold.platform.termination.unimproved-spent-limit=PT1S
# Effectively disable termination in favor of the best-score-limit
%test.ai.timefold.platform.termination.best-score-limit=0hard/0medium/*soft

# Some of the tests may use SolverManager directly, declare solver's out-of-the-box variables
%test.quarkus.timefold.solver.termination.spent-limit=PT10S
%test.quarkus.timefold.solver.termination.unimproved-spent-limit=PT1S
%test.quarkus.timefold.solver.termination.best-score-limit=0hard/0medium/*soft

########################################
# Default multi-threading configuration
########################################

ai.timefold.model.max-thread-count=1

# Do not remove this property as the platform sets env. var QUARKUS_TIMEFOLD_SOLVER_MOVE_THREAD_COUNT and if the property
# is omitted here, Quarkus will not read it
quarkus.timefold.solver.move-thread-count=NONE

#################################
# Default logging configuration
#################################
quarkus.log.console.format=%d{HH:mm:ss.SSS} %5p [%t] %m%n
# Workaround on white-background console for https://github.com/quarkusio/quarkus/issues/33541
quarkus.log.console.darken=1

# debug profile settings
%debug.quarkus.log.category.\"ai.timefold.solver\".level=DEBUG

# debug with file logging profile settings
%debugfile.quarkus.log.console.level=INFO
%debugfile.quarkus.log.category.\"ai.timefold.solver\".level=DEBUG
%debugfile.quarkus.log.file.enable=true
%debugfile.quarkus.log.file.format=%d{HH:mm:ss.SSS} %5p [%t] %m%n
%debugfile.quarkus.log.file.path=/tmp/timefold-trace.log

########################
# REST API configuration
########################
quarkus.rest.path=${model.api.version}

########################
# OpenAPI and swagger ui configuration
########################
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.title=${timefold.application.name}
quarkus.smallrye-openapi.store-schema-directory=target/openapi-schema
mp.openapi.extensions.smallrye.info.title=${timefold.application.name}
mp.openapi.extensions.smallrye.info.version=${timefold.application.version}
mp.openapi.extensions.smallrye.info.description=${timefold.application.description}
mp.openapi.extensions.smallrye.info.contact.email=${timefold.application.contact.email}
mp.openapi.extensions.smallrye.info.contact.name=${timefold.application.contact.name}
mp.openapi.extensions.smallrye.info.contact.url=${timefold.application.contact.url}
mp.openapi.extensions.smallrye.remove-unused-schemas.enable=true

########################
# Container configuration
########################
image.native-suffix=-native
# the end model should also set %container.quarkus.container-image.group
%container.quarkus.container-image.name=model-${timefold.application.id}-${model.api.version}

# the end model should also set %container-native.quarkus.container-image.group
%container-native.quarkus.container-image.name=model-${timefold.application.id}-${model.api.version}${image.native-suffix}

########################################################################
# Default configuration profile settings relevant for the platform only
########################################################################
ai.timefold.model.default-config.description=Default configuration
ai.timefold.model.default-config.max-thread-count=1
ai.timefold.model.default-config.resources.memory.mi=128
ai.timefold.model.default-config.termination.spent-limit=PT10M
# disabling the unimproved-spent-limit enables Diminished Returns termination
ai.timefold.model.default-config.termination.unimproved-spent-limit=
