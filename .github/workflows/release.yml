name: Publish to GitHub Packages
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
      sourceBranch:
        description: "Branch or tag to build from"
        default: main
        required: true
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.sourceBranch }}

      - name: Set up Java and Maven for GitHub Packages
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Set project version
        run: ./mvnw --batch-mode -Dfull versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false

      - name: Build and publish to GitHub Packages
        run: ./mvnw --batch-mode -Dfull deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
